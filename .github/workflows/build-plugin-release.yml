name: Build Plugin Zip And Tag Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Package plugin zip
        id: package
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "${TAG_NAME}" != "v${VERSION}" ]]; then
            echo "Tag '${TAG_NAME}' does not match pom version 'v${VERSION}'."
            echo "Use a matching tag (example: v${VERSION})."
            exit 1
          fi

          JAR_PATH="$(ls target/*.jar | grep -v 'sources.jar' | grep -v 'javadoc.jar' | grep -v 'original-' | head -n 1)"
          if [[ -z "${JAR_PATH}" ]]; then
            echo "No plugin jar found in target/."
            exit 1
          fi

          mkdir -p dist/plugins
          cp "${JAR_PATH}" "dist/plugins/"

          ZIP_NAME="PolarPvP-Manager-${VERSION}-${TAG_NAME}-plugins.zip"
          (
            cd dist
            zip -r "../${ZIP_NAME}" plugins
          )

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "zip=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: ${{ steps.package.outputs.zip }}

      - name: Create tag release with zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          name: Build ${{ steps.package.outputs.version }} (${{ steps.package.outputs.tag }})
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip }}
